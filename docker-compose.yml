version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reporting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reporting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reporting}
      POSTGRES_DB: ${POSTGRES_DB:-reporting}
      TASKHUB_ALEX_PASSWORD: ${TASKHUB_ALEX_PASSWORD:-alex}
      TASKHUB_IVAN_PASSWORD: ${TASKHUB_IVAN_PASSWORD:-ivan}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - reporting_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/init-users.sh:/docker-entrypoint-initdb.d/02-init-users.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporting -d reporting"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  reporting_pgdata:
