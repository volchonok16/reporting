version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reporting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reporting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reporting}
      POSTGRES_DB: ${POSTGRES_DB:-reporting}
      TASKHUB_ALEX_PASSWORD: ${TASKHUB_ALEX_PASSWORD:-alex}
      TASKHUB_IVAN_PASSWORD: ${TASKHUB_IVAN_PASSWORD:-ivan}
    volumes:
      - reporting_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/init-users.sh:/docker-entrypoint-initdb.d/02-init-users.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporting -d reporting"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: reporting-backend
    restart: unless-stopped
    volumes:
      - ./secrets:/app/secrets:ro
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://alex:alex@postgres:5432/reporting}
      TFS_BASE_URL: ${TFS_BASE_URL:-https://tfs.t2.ru/tfs/Main}
      TFS_VERIFY_TLS: ${TFS_VERIFY_TLS:-true}
      TFS_BATCH_SIZE: ${TFS_BATCH_SIZE:-100}
      TFS_REQUEST_DELAY_SECONDS: ${TFS_REQUEST_DELAY_SECONDS:-0.2}
      TFS_TIMEOUT_SECONDS: ${TFS_TIMEOUT_SECONDS:-45}
      TFS_API_VERSION: ${TFS_API_VERSION:-6.1}
      TFS_FETCH_ALL_FIELDS: ${TFS_FETCH_ALL_FIELDS:-false}
      TFS_FETCH_RELATIONS: ${TFS_FETCH_RELATIONS:-false}
      TFS_LINKED_BATCH_SIZE: ${TFS_LINKED_BATCH_SIZE:-200}
      TFS_WIQL_MAX_RESULTS: ${TFS_WIQL_MAX_RESULTS:-15000}
      TFS_CLOSED_STATE_VALUES: ${TFS_CLOSED_STATE_VALUES:-Closed}
      TFS_EXCLUDE_CLOSED_OLDER_THAN_DAYS: ${TFS_EXCLUDE_CLOSED_OLDER_THAN_DAYS:-365}
      TFS_PILOT_STATE_VALUES: ${TFS_PILOT_STATE_VALUES:-Пилот,Pilot}
      TFS_FETCH_PILOT_HISTORY: ${TFS_FETCH_PILOT_HISTORY:-true}
      LAUNCHING_SOON_DAYS: ${LAUNCHING_SOON_DAYS:-60}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:5173}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8000}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
      TFS_SYNC_PAT: ${TFS_SYNC_PAT:-}
      APP_AUTH_USERS: ${APP_AUTH_USERS:-}
      APP_AUTH_ROADMAP_USERS: ${APP_AUTH_ROADMAP_USERS:-}
      GOOGLE_SHEETS_API_KEY: ${GOOGLE_SHEETS_API_KEY:-}
      GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON: ${GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON:-}
      OUTBOUND_HTTP_PROXY: ${OUTBOUND_HTTP_PROXY:-}
      B2B_PRODUCT_STATUS_SPREADSHEET_ID: ${B2B_PRODUCT_STATUS_SPREADSHEET_ID:-}
      B2B_PRODUCT_STATUS_SHEET_URL: ${B2B_PRODUCT_STATUS_SHEET_URL:-}
      B2B_PRODUCT_STATUS_SHEETS: ${B2B_PRODUCT_STATUS_SHEETS:-}
      B2B_PRODUCT_STATUS_SHEET_PUBLIC_URL: ${B2B_PRODUCT_STATUS_SHEET_PUBLIC_URL:-}
      B2B_PRODUCT_STATUS_PRESENTATION_TEMPLATE: ${B2B_PRODUCT_STATUS_PRESENTATION_TEMPLATE:-}
      B2B_PRODUCT_STATUS_PRESENTATION_REFERENCE_URL: ${B2B_PRODUCT_STATUS_PRESENTATION_REFERENCE_URL:-}
      B2B_NEWS_SPREADSHEET_ID: ${B2B_NEWS_SPREADSHEET_ID:-}
      B2B_NEWS_SHEET_URL: ${B2B_NEWS_SHEET_URL:-}
      B2B_NEWS_SHEETS: ${B2B_NEWS_SHEETS:-}
      B2B_NEWS_SHEET_PUBLIC_URL: ${B2B_NEWS_SHEET_PUBLIC_URL:-}
      ORG_UPLOADS_DIR: ${ORG_UPLOADS_DIR:-/app/uploads}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-photos}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: reporting-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - reporting_miniodata:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    container_name: reporting-minio-init
    restart: "no"
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-photos}
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb local/$$MINIO_BUCKET --ignore-existing &&
      mc anonymous set download local/$$MINIO_BUCKET
      "

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: reporting-frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  reporting_pgdata:
  reporting_miniodata:
