# Corp-сервер без nginx: порты на все интерфейсы (временный доступ по IP/домену).
# api/minio поддомены на :80 без reverse-proxy не работают — нужен nginx или corp LB.
#
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml \
#     -f docker-compose.offline.yml -f docker-compose.corp-direct.yml up -d --no-build

services:
  backend:
    ports:
      - "8000:8000"

  frontend:
    ports:
      - "80:5173"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  postgres:
    ports:
      - "127.0.0.1:5432:5432"
