# Offline / air-gapped deploy: фиксированные имена образов, без pull с Docker Hub.
# Сборка bundle: bash scripts/offline-bundle.sh
# На сервере: bash scripts/offline-deploy.sh /tmp/reporting-offline.tar
#
# Без pull_policy — совместимо с docker-compose 1.29 на закрытых VPS.
# Образы уже должны быть в локальном Docker (docker load).

services:
  postgres:
    image: reporting/postgres:16-alpine

  backend:
    image: reporting/backend:offline
    build:
      context: .
      dockerfile: backend/Dockerfile

  frontend:
    image: reporting/frontend:offline
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}

  minio:
    image: reporting/minio:2025-04-22

  minio-init:
    image: reporting/minio-mc:2025-04-08
