# Production: приложение на localhost, снаружи — nginx + Let's Encrypt.
#
#   cp .env.production.example .env
#   sudo bash scripts/production.sh

services:
  postgres:
    ports: []

  backend:
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${BACKEND_WORKERS:-2}"
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://taskatestovaya.ru}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://api.taskatestovaya.ru}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://taskatestovaya.ru,https://www.taskatestovaya.ru,https://pallink.fun,https://www.pallink.fun}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://minio.taskatestovaya.ru}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.taskatestovaya.ru}
    ports:
      - "127.0.0.1:5173:5173"

  minio:
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
