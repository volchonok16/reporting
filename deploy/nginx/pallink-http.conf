# HTTP-only: только pallink.fun (без SSL, закрытый / offline контур)
#
# Ставится: sudo bash deploy/setup-nginx-http.sh --pallink
# DNS → IP сервера: pallink.fun, www.pallink.fun, api.pallink.fun
#           опционально: minio.pallink.fun, minio-console.pallink.fun

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name pallink.fun www.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_pass http://127.0.0.1:8000/api/;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:5173;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://127.0.0.1:8000;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name minio.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        include snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:9000;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name minio-console.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        include snippets/proxy-common.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://127.0.0.1:9001;
    }
}
