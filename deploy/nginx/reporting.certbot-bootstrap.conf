# HTTP bootstrap до выпуска SSL (taskatestovaya.ru + pallink.fun)

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name taskatestovaya.ru www.taskatestovaya.ru pallink.fun www.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_pass http://127.0.0.1:8000/api/;
    }

    location / {
        include snippets/proxy-common.conf;
        proxy_set_header Host localhost;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://127.0.0.1:5173;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.taskatestovaya.ru api.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://127.0.0.1:8000;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name minio.taskatestovaya.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
