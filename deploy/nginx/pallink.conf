# Legacy — см. deploy/nginx/reporting.conf (taskatestovaya.ru + pallink.fun).
# Reporting — pallink.fun, www, api.pallink.fun
#
# Сертификат:
#   sudo certbot certonly --webroot -w /var/www/certbot \
#     -d pallink.fun -d www.pallink.fun -d api.pallink.fun

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name pallink.fun www.pallink.fun api.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pallink.fun;

    include snippets/ssl-pallink.conf;

    client_max_body_size 50m;

    # /api/ до редиректа — иначе POST/OPTIONS с www ловят 301 без CORS (Failed to fetch в Edge)
    location /api/ {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_pass http://127.0.0.1:8000/api/;
    }

    location / {
        return 301 https://pallink.fun$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pallink.fun;

    include snippets/ssl-pallink.conf;

    client_max_body_size 50m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_pass http://127.0.0.1:8000/api/;
    }

    location / {
        include snippets/proxy-common.conf;
        proxy_set_header Host localhost;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://127.0.0.1:5173;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.pallink.fun;

    include snippets/ssl-pallink.conf;

    client_max_body_size 50m;

    location / {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_pass http://127.0.0.1:8000;
    }
}
