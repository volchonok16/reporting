# Reporting — taskatestovaya.ru + pallink.fun (оба работают параллельно)
#
# SSL snippet генерируется deploy/setup-nginx-ssl.sh → snippets/ssl-reporting.conf
# Certbot: CERTBOT_CERT_NAME + CERTBOT_DOMAINS в .env

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# --- HTTP → HTTPS (все хосты) ---
server {
    listen 80;
    listen [::]:80;
    server_name
        taskatestovaya.ru www.taskatestovaya.ru
        api.taskatestovaya.ru
        minio.taskatestovaya.ru minio-console.taskatestovaya.ru
        pallink.fun www.pallink.fun api.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- www → apex ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.taskatestovaya.ru;

    include snippets/ssl-reporting.conf;
    client_max_body_size 50m;

    location /api/ {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_pass http://127.0.0.1:8000/api/;
    }

    location / {
        return 301 https://taskatestovaya.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pallink.fun;

    include snippets/ssl-reporting.conf;
    client_max_body_size 50m;

    location /api/ {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_pass http://127.0.0.1:8000/api/;
    }

    location / {
        return 301 https://pallink.fun$request_uri;
    }
}

# --- UI: taskatestovaya.ru ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name taskatestovaya.ru;

    include snippets/ssl-reporting.conf;
    client_max_body_size 50m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_pass http://127.0.0.1:8000/api/;
    }

    location / {
        # static nginx frontend — без Host localhost / Connection upgrade (иначе 400)
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:5173;
    }
}

# --- UI: pallink.fun ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pallink.fun;

    include snippets/ssl-reporting.conf;
    client_max_body_size 50m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_pass http://127.0.0.1:8000/api/;
    }

    location / {
        # static nginx frontend — без Host localhost / Connection upgrade (иначе 400)
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:5173;
    }
}

# --- API ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.taskatestovaya.ru api.pallink.fun;

    include snippets/ssl-reporting.conf;
    client_max_body_size 50m;

    location / {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_pass http://127.0.0.1:8000;
    }
}

# --- MinIO S3 API ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name minio.taskatestovaya.ru;

    include snippets/ssl-reporting.conf;
    client_max_body_size 50m;

    location / {
        include snippets/proxy-common.conf;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://127.0.0.1:9000;
    }
}

# --- MinIO Console ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name minio-console.taskatestovaya.ru;

    include snippets/ssl-reporting.conf;
    client_max_body_size 50m;

    location / {
        include snippets/proxy-common.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://127.0.0.1:9001;
    }
}
