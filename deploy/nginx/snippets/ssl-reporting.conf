# Пути перезаписываются deploy/setup-nginx-ssl.sh из CERTBOT_CERT_NAME.
# До первого деплоя — placeholder (HTTPS-конфиг не активен без bootstrap).
ssl_certificate /etc/letsencrypt/live/reporting/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/reporting/privkey.pem;
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:10m;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
