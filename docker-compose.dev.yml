# Локальная разработка:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app:ro

  frontend:
    ports:
      - "5173:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
