<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Reporting">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0a" />
      <stop offset="1" stop-color="#151515" />
    </linearGradient>
    <linearGradient id="t2-pink" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ff4db8" />
      <stop offset="1" stop-color="#ff0090" />
    </linearGradient>
    <linearGradient id="t2-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#67e8f9" />
      <stop offset="1" stop-color="#40b3d8" />
    </linearGradient>
    <linearGradient id="t2-lime" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#eaff00" />
      <stop offset="1" stop-color="#c8f000" />
    </linearGradient>
    <linearGradient id="t2-flow" x1="22" y1="42" x2="50" y2="16" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff0090" />
      <stop offset="0.48" stop-color="#40b3d8" />
      <stop offset="1" stop-color="#c8f000" />
    </linearGradient>
    <filter id="pink-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.1" flood-color="#ff0090" flood-opacity="0.45" />
    </filter>
    <filter id="lime-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.3" flood-color="#c8f000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#bg)" />

  <!-- T2 signature pink mark -->
  <rect x="11" y="15" width="8" height="34" rx="2" fill="url(#t2-pink)" filter="url(#pink-glow)" />

  <!-- analytics card -->
  <rect
    x="22"
    y="16"
    width="31"
    height="33"
    rx="7"
    fill="#ffffff"
    fill-opacity="0.04"
    stroke="#ffffff"
    stroke-opacity="0.1"
  />

  <!-- KPI bars: pink → cyan → lime -->
  <rect x="26" y="38" width="6" height="8" rx="1.8" fill="url(#t2-pink)" />
  <rect x="34.5" y="31" width="6" height="15" rx="1.8" fill="url(#t2-cyan)" />
  <rect x="43" y="22" width="6" height="24" rx="1.8" fill="url(#t2-lime)" filter="url(#lime-glow)" />

  <!-- growth curve -->
  <path
    d="M24 41.5 34.5 33.5 43.5 26.5 50.5 19.5"
    fill="none"
    stroke="url(#t2-flow)"
    stroke-width="2.7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle cx="50.5" cy="19.5" r="3" fill="#c8f000" filter="url(#lime-glow)" />
  <circle cx="50.5" cy="19.5" r="1.1" fill="#ffffff" fill-opacity="0.92" />
</svg>
